<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Board</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">TASK<span>BOARD</span></h1>
      <span class="task-counter" id="taskCounter">0 tasks</span>
    </div>
    <div class="header-right">
      <label for="priorityFilter" class="filter-label">Filter:</label>
      <select id="priorityFilter" class="filter-select">
        <option value="all">All Priorities</option>
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
  </header>

  <!-- ========== BOARD ========== -->
  <main class="board">

    <!-- TO DO -->
    <section class="column" id="todo">
      <div class="column-header">
        <h2 class="column-title">To Do</h2>
        <span class="column-count" id="todoCount">0</span>
      </div>
      <ul class="task-list" id="todoList"></ul>
      <button class="add-task-btn" data-column="todo">+ Add Task</button>
    </section>

    <!-- IN PROGRESS -->
    <section class="column" id="inprogress">
      <div class="column-header">
        <h2 class="column-title">In Progress</h2>
        <span class="column-count" id="inprogressCount">0</span>
      </div>
      <ul class="task-list" id="inprogressList"></ul>
      <button class="add-task-btn" data-column="inprogress">+ Add Task</button>
    </section>

    <!-- DONE -->
    <section class="column" id="done">
      <div class="column-header">
        <h2 class="column-title">Done</h2>
        <span class="column-count" id="doneCount">0</span>
      </div>
      <ul class="task-list" id="doneList"></ul>
      <div class="column-footer">
        <button class="add-task-btn" data-column="done">+ Add Task</button>
        <button class="clear-done-btn" id="clearDoneBtn">Clear All</button>
      </div>
    </section>

  </main>

  <!-- ========== MODAL ========== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="taskModal">
      <h2 class="modal-title" id="modalTitle">New Task</h2>

      <label class="modal-label" for="taskTitle">Title</label>
      <input class="modal-input" type="text" id="taskTitle" placeholder="What needs to be done?" />

      <label class="modal-label" for="taskDesc">Description</label>
      <textarea class="modal-textarea" id="taskDesc" rows="3" placeholder="Add some details..."></textarea>

      <label class="modal-label" for="taskPriority">Priority</label>
      <select class="modal-select" id="taskPriority">
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>

      <label class="modal-label" for="taskDue">Due Date</label>
      <input class="modal-input" type="date" id="taskDue" />

      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalSave">Save Task</button>
      </div>
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
